<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JobAI</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; background:#1d1d1f; }
        iframe {
            width:100%; height:100%;
            border:none;
            position:fixed; top:0; left:0;
        }
        #loading {
            position:fixed; inset:0;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            background:#1d1d1f; color:white;
            font-family: -apple-system, 'Inter', sans-serif;
            z-index:999;
        }
        .icon {
            width:80px; height:80px; border-radius:20px;
            background:#0071e3; display:flex;
            align-items:center; justify-content:center;
            font-size:40px; margin-bottom:20px;
        }
        .title { font-size:1.4rem; font-weight:700; letter-spacing:-0.02em; }
        .sub { font-size:0.85rem; color:rgba(255,255,255,0.4); margin-top:6px; }
        .spinner {
            width:24px; height:24px; border:2px solid rgba(255,255,255,0.2);
            border-top-color:#0071e3; border-radius:50%;
            animation:spin 0.8s linear infinite; margin-top:32px;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="icon">💼</div>
        <div class="title">JobAI</div>
        <div class="sub">AI-powered job search</div>
        <div class="spinner"></div>
    </div>
</body>
</html>
